<!DOCTYPE html>
<html{if="$language !== 'auto'"} lang="{$language}"{/if}>
<head>
  {include="includes"}
</head>
<body>
{include="page.header"}

<form method="POST" action="{$base_path}/admin/export" name="exportform" id="exportform">
  <div class="pure-g">
    <div class="pure-u-lg-1-4 pure-u-1-24"></div>
    <div class="pure-u-lg-1-2 pure-u-22-24 page-form-configure">
      <h2 class="window-title">{"Export Database"|t}</h2>
      <input type="hidden" name="token" value="{$token}">

      <div class="cfg-section">
        <div class="cfg-row cfg-row-field">
          <label class="cfg-label">{'Selection'|t}</label>
          <div class="cfg-radio-group">
            <label><input type="radio" name="selection" value="all" checked="checked"> {'All'|t}</label>
            <label><input type="radio" name="selection" value="private"> {'Private'|t}</label>
            <label><input type="radio" name="selection" value="public"> {'Public'|t}</label>
          </div>
        </div>

        <div class="cfg-row cfg-row-toggle">
          <div class="cfg-toggle-label">
            <span class="cfg-label">{'Prepend note permalinks with this Shaarli instance\'s URL'|t}</span>
            <span class="cfg-desc">{'Useful to import bookmarks in a web browser'|t}</span>
          </div>
          <label class="cfg-toggle">
            <input type="checkbox" name="prepend_note_url" id="prepend_note_url">
            <span class="cfg-toggle-slider"></span>
          </label>
        </div>
      </div>

      <div class="cfg-submit">
        <input type="submit" value="{'Export'|t}">
      </div>
    </div>
    <div class="pure-u-lg-1-4 pure-u-1-24"></div>
  </div>
</form>

{include="page.footer"}
</body>
</html>
