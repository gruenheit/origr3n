<!DOCTYPE html>
<html{if="$language !== 'auto'"} lang="{$language}"{/if}>
<head>
  {include="includes"}
</head>
<body>
{include="page.header"}
<div class="pure-g">
  <div class="pure-u-lg-1-3 pure-u-1-24"></div>
  <div class="pure-u-lg-1-3 pure-u-22-24 page-form-configure">
    <h2 class="window-title">{"Change password"|t}</h2>
    <form method="POST" action="{$base_path}/admin/password" name="changepasswordform" id="changepasswordform">
      <div class="cfg-section">
        <div class="cfg-row cfg-row-field">
          <input type="password" name="oldpassword" class="cfg-input autofocus"
                 aria-label="{'Current password'|t}" placeholder="{'Current password'|t}">
        </div>
        <div class="cfg-row cfg-row-field">
          <input type="password" name="setpassword" class="cfg-input"
                 aria-label="{'New password'|t}" placeholder="{'New password'|t}">
        </div>
      </div>
      <input type="hidden" name="token" value="{$token}">
      <div class="cfg-submit">
        <input type="submit" value="{'Change'|t}">
      </div>
    </form>
  </div>
  <div class="pure-u-lg-1-3 pure-u-1-24"></div>
</div>
{include="page.footer"}
</body>
</html>
