<!DOCTYPE html>
<html{if="$language !== 'auto'"} lang="{$language}"{/if}>
<head>
  {include="includes"}
</head>
<body>
{include="page.header"}

<form method="POST" action="{$base_path}/admin/import" enctype="multipart/form-data" name="uploadform" id="uploadform">
  <div class="pure-g">
    <div class="pure-u-lg-1-4 pure-u-1-24"></div>
    <div class="pure-u-lg-1-2 pure-u-22-24 page-form-configure">
      <h2 class="window-title">{"Import Database"|t}</h2>
      <input type="hidden" name="token" value="{$token}">

      <div class="cfg-section">
        <div class="cfg-file-upload">
          <input type="hidden" name="MAX_FILE_SIZE" value="{$maxfilesize}">
          <input type="file" name="filetoupload">
          <p>{'Maximum size allowed:'|t} <strong>{$maxfilesizeHuman}</strong></p>
        </div>

        <div class="cfg-row cfg-row-field">
          <label class="cfg-label">{'Visibility'|t}</label>
          <div class="cfg-radio-group">
            <label><input type="radio" name="privacy" value="default" checked="checked"> {'Use values from the imported file, default to public'|t}</label>
            <label><input type="radio" name="privacy" value="private"> {'Import all bookmarks as private'|t}</label>
            <label><input type="radio" name="privacy" value="public"> {'Import all bookmarks as public'|t}</label>
          </div>
        </div>

        <div class="cfg-row cfg-row-toggle">
          <div class="cfg-toggle-label">
            <span class="cfg-label">{'Overwrite existing bookmarks'|t}</span>
            <span class="cfg-desc">{'Duplicates based on URL'|t}</span>
          </div>
          <label class="cfg-toggle">
            <input type="checkbox" name="overwrite" id="overwrite">
            <span class="cfg-toggle-slider"></span>
          </label>
        </div>

        <div class="cfg-row cfg-row-field">
          <label class="cfg-label" for="default_tags">{'Add default tags'|t}</label>
          <input type="text" name="default_tags" id="default_tags" class="cfg-input"
                 aria-label="{'Tag'|t}" placeholder="{'Tag'|t}">
        </div>
      </div>

      <div class="cfg-submit">
        <input type="submit" name="import_file" value="{'Import'|t}">
      </div>
    </div>
    <div class="pure-u-lg-1-4 pure-u-1-24"></div>
  </div>
</form>

{include="page.footer"}
</body>
</html>
